version: "3.9"

services:
  backend:
    build: .
    container_name: trading-backend
    depends_on:
      - redis
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  redis:
    image: redis:7.0-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"